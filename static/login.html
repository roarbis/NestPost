<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NestPost — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body {
      margin: 0; min-height: 100vh;
      background: url('/static/bg/background.png') center/cover no-repeat fixed;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: rgba(3,7,18,0.55);
      backdrop-filter: blur(2px);
      z-index: 0;
    }
    .login-card {
      position: relative; z-index: 1;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 48px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 80px rgba(99,102,241,0.08);
      text-align: center;
    }
    .logo {
      width: 60px; height: 60px; border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-weight: 800; font-size: 1.3rem;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
    }
    h1 { font-size: 1.625rem; font-weight: 800; color: #f1f5f9; margin: 0 0 6px; }
    .subtitle { font-size: 0.875rem; color: #64748b; margin: 0 0 32px; font-weight: 500; }
    #setup-hint {
      font-size: 0.8rem; color: #a5b4fc; background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25); border-radius: 10px;
      padding: 10px 14px; margin-bottom: 20px; display: none;
    }
    label { display: block; text-align: left; font-size: 0.8125rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px; font-size: 0.9375rem; color: #f1f5f9;
      background: rgba(15,23,42,0.5);
      transition: all 0.15s; outline: none;
    }
    input::placeholder { color: #475569; }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); background: rgba(15,23,42,0.7); }
    #confirm-group { display: none; margin-top: 14px; }
    .btn {
      width: 100%; padding: 13px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-weight: 700; font-size: 0.9375rem;
      cursor: pointer; transition: all 0.2s; margin-top: 24px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .error {
      color: #f87171; font-size: 0.8125rem; font-weight: 600;
      margin-top: 12px; display: none;
    }
    .footer { font-size: 0.75rem; color: #475569; margin-top: 28px; }
    .footer a { color: #818cf8; text-decoration: none; font-weight: 600; }
    .footer a:hover { color: #a5b4fc; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .login-card { animation: fadeIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* Aurora Light theme */
    body.light-theme::before { background: rgba(247,255,253,0.4); }
    body.light-theme .login-card { background: rgba(255,255,255,0.85); border-color: rgba(0,0,0,0.08); box-shadow: 0 24px 60px rgba(0,0,0,0.08), 0 0 80px rgba(63,199,195,0.1); }
    body.light-theme .logo { background: linear-gradient(135deg, #3FC7C3, #00EA8D); box-shadow: 0 8px 24px rgba(63,199,195,0.3); }
    body.light-theme h1 { color: #1D4E6B; }
    body.light-theme .subtitle { color: #5D868E; }
    body.light-theme label { color: #5D868E; }
    body.light-theme input { background: rgba(247,255,253,0.8); color: #1D4E6B; border-color: rgba(0,0,0,0.1); }
    body.light-theme input::placeholder { color: #84BAAE; }
    body.light-theme input:focus { border-color: #3FC7C3; box-shadow: 0 0 0 3px rgba(63,199,195,0.2); background: #fff; }
    body.light-theme .btn { background: linear-gradient(135deg, #3FC7C3, #00EA8D); box-shadow: 0 4px 16px rgba(63,199,195,0.3); }
    body.light-theme .btn:hover { box-shadow: 0 8px 28px rgba(63,199,195,0.4); }
    body.light-theme .footer { color: #84BAAE; }
    body.light-theme .footer a { color: #097FA5; }
    body.light-theme #setup-hint { color: #097FA5; background: rgba(63,199,195,0.1); border-color: rgba(63,199,195,0.25); }
  </style>
</head>
<body>
  <script>if (localStorage.getItem('nestpost-theme') === 'light') document.body.classList.add('light-theme');</script>
  <div class="login-card">
    <div class="logo">NP</div>
    <h1>NestPost</h1>
    <p class="subtitle" id="subtitle">Sign in to your account</p>
    <div id="setup-hint">First time? Create your admin password below.</div>

    <form id="auth-form" onsubmit="handleSubmit(event)">
      <div style="margin-bottom:14px;">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required autofocus />
      </div>
      <div>
        <label for="password" id="password-label">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required />
      </div>
      <div id="confirm-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
      <div class="error" id="error-msg"></div>
    </form>

    <p class="footer">by <a href="#">ConnectNest</a></p>
  </div>

  <script>
    let isSetup = false;

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('/api/auth-status');
        const data = await res.json();
        if (!data.setup_done) {
          isSetup = true;
          document.getElementById('subtitle').textContent = 'Create your admin password';
          document.getElementById('setup-hint').style.display = 'block';
          document.getElementById('confirm-group').style.display = 'block';
          document.getElementById('submit-btn').textContent = 'Create Account';
          document.getElementById('password-label').textContent = 'New Password';
          document.getElementById('password').placeholder = 'Minimum 6 characters';
          document.getElementById('password').autocomplete = 'new-password';
        }
      } catch { /* default to login */ }
    });

    async function handleSubmit(e) {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username) {
        errEl.textContent = 'Username is required';
        errEl.style.display = '';
        return;
      }

      if (isSetup) {
        const confirm = document.getElementById('confirm').value;
        if (password.length < 6) {
          errEl.textContent = 'Password must be at least 6 characters';
          errEl.style.display = '';
          return;
        }
        if (password !== confirm) {
          errEl.textContent = 'Passwords do not match';
          errEl.style.display = '';
          return;
        }
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = isSetup ? 'Creating...' : 'Signing in...';

      try {
        const endpoint = isSetup ? '/api/setup' : '/api/login';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Failed' }));
          throw new Error(err.detail || 'Authentication failed');
        }

        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = '';
        btn.disabled = false;
        btn.textContent = isSetup ? 'Create Account' : 'Sign In';
      }
    }
  </script>
</body>
</html>
